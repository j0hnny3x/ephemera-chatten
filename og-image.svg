<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#000000"/>
  <!-- Matrix dots -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#matrix-grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="matrix-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Box -->
  <rect x="80" y="100" width="1040" height="430" rx="8" fill="rgba(0,15,0,0.88)" stroke="#00ff41" stroke-width="2" filter="url(#glow)"/>
  <!-- Lock -->
  <text x="600" y="215" font-family="serif" font-size="80" text-anchor="middle" fill="#00ff41" filter="url(#glow)">🔒</text>
  <!-- Title -->
  <text x="600" y="300" font-family="monospace" font-size="58" font-weight="bold" text-anchor="middle" fill="#39ff14" filter="url(#glow)">ephemera</text>
  <!-- Subtitle -->
  <text x="600" y="350" font-family="monospace" font-size="26" text-anchor="middle" fill="#00cc44">Privater verschlüsselter Einmal-Chat</text>
  <!-- Divider -->
  <line x1="160" y1="375" x2="1040" y2="375" stroke="#1a3a1a" stroke-width="1"/>
  <!-- Features -->
  <text x="600" y="415" font-family="monospace" font-size="20" text-anchor="middle" fill="#006622">&gt; Ende-zu-Ende-verschlüsselt · AES-GCM-256</text>
  <text x="600" y="450" font-family="monospace" font-size="20" text-anchor="middle" fill="#006622">&gt; Kein Login · Kein Account · Keine Speicherung</text>
  <text x="600" y="485" font-family="monospace" font-size="20" text-anchor="middle" fill="#006622">&gt; Raum wird nach Ende automatisch gelöscht</text>
</svg>
